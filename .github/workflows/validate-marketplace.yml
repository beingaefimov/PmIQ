name: Validate PM IQ Marketplace

on:
  push:
    branches: [main, master]
    paths:
      - 'plugins/**'
      - '.github/plugin/marketplace.json'
      - 'server.json'
  pull_request:
    branches: [main, master]
    paths:
      - 'plugins/**'
      - '.github/plugin/marketplace.json'
      - 'server.json'
  workflow_dispatch:

jobs:
  validate:
    name: Validate Marketplace Structure
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema

      - name: Validate JSON syntax
        run: |
          echo "=== Checking JSON syntax ==="
          for file in server.json .github/plugin/marketplace.json; do
            if [ -f "$file" ]; then
              python -c "import json; json.load(open('$file'))" && echo "✓ $file is valid JSON"
            fi
          done
          
          # Проверяем все .mcp.json в плагинах
          find plugins -name ".mcp.json" -type f | while read file; do
            python -c "import json; json.load(open('$file'))" && echo "✓ $file is valid JSON"
          done

      - name: Run marketplace validation script
        run: python scripts/validate_marketplace.py

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: validation-report.json
          retention-days: 7
