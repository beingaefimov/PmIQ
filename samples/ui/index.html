<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PM IQ Agent</title>
    <script src="/static/js/echarts.min.js"></script>
    <script src="/static/js/marked.min.js"></script>
    <style>
        :root {
            --bg-page:        #15171c;
            --bg-surface:     #1d2027;
            --bg-surface-2:   #232730;
            --bg-input:       #181b21;
            --bg-deep:        #0f1115;

            --border:         #2a2f3a;
            --border-strong:  #353b48;
            --border-soft:    rgba(255, 255, 255, 0.04);

            --text:           #e6e8ec;
            --text-muted:     #9aa1ad;
            --text-dim:       #6b7180;

            --accent:         #6ad3c9;
            --accent-strong:  #7ee0d6;
            --accent-soft:    rgba(106, 211, 201, 0.14);
            --accent-border:  rgba(106, 211, 201, 0.35);

            --shadow-sm:      0 1px 2px rgba(0, 0, 0, 0.25);
            --shadow-md:      0 4px 16px rgba(0, 0, 0, 0.28), 0 1px 2px rgba(0, 0, 0, 0.2);

            --radius-sm:  8px;
            --radius-md:  12px;
            --radius-lg:  14px;

            --font-sans: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', 'Courier New', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }

        body {
            font-family: var(--font-sans);
            font-size: 15px;
            line-height: 1.5;
            color: var(--text);
            background-color: var(--bg-page);
            background-image:
                radial-gradient(1200px 600px at 80% -10%, rgba(106, 211, 201, 0.06), transparent 60%),
                radial-gradient(900px 500px at 0% 100%, rgba(80, 110, 180, 0.05), transparent 60%);
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            padding: 2.5rem 1.5rem 4rem;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container { max-width: 1080px; margin: 0 auto; }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.35rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.2px;
        }

        h1 .accent { color: var(--accent); }

        .mode-switcher {
            position: relative;
            display: inline-flex;
            align-items: center;
        }

        .mode-toggle {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: inherit;
            font-size: 0.78rem;
            letter-spacing: 0.3px;
            padding: 0.45rem 0.8rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            white-space: nowrap;
        }

        .mode-toggle:hover {
            border-color: var(--accent-border);
            background: var(--bg-surface-2);
        }

        .mode-toggle .mode-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
            box-shadow: 0 0 6px var(--accent-soft);
        }

        .mode-toggle .mode-arrow {
            color: var(--text-dim);
            font-size: 0.65rem;
            transition: transform 0.2s;
        }

        .mode-toggle.open .mode-arrow { transform: rotate(180deg); }

        .mode-menu {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            min-width: 360px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            display: none;
            z-index: 200;
            overflow: hidden;
        }

        .mode-menu.active { display: block; }

        .mode-item {
            padding: 0.85rem 1rem;
            cursor: pointer;
            border-bottom: 1px solid var(--border-soft);
            transition: background 0.15s;
        }

        .mode-item:last-child { border-bottom: none; }
        .mode-item:hover { background: var(--bg-surface-2); }
        .mode-item.active { background: var(--accent-soft); }

        .mode-item .mode-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .mode-item.active .mode-name::before {
            content: '●'; color: var(--accent); font-size: 0.7rem;
        }

        .mode-item:not(.active) .mode-name::before {
            content: '○'; color: var(--text-dim); font-size: 0.7rem;
        }

        .mode-item .mode-desc {
            font-size: 0.78rem;
            color: var(--text-dim);
            line-height: 1.45;
        }

        .input-section {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0.5rem;
            margin-bottom: 1.25rem;
            box-shadow: var(--shadow-sm);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-section:focus-within {
            border-color: var(--accent-border);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        .input-wrapper { position: relative; }

        #questionInput {
            width: 100%;
            padding: 0.85rem 3rem 0.85rem 1rem;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        #questionInput::placeholder { color: var(--text-dim); }
        #questionInput:focus { border-color: var(--accent-border); }

        .dropdown-toggle {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            width: 2rem; height: 2rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.75rem;
            border-radius: 6px;
            transition: transform 0.25s ease, color 0.2s, background 0.2s;
        }

        .dropdown-toggle:hover { color: var(--text); background: var(--bg-surface-2); }
        .dropdown-toggle.rotated { transform: translateY(-50%) rotate(180deg); }

        .dropdown-menu {
            position: absolute;
            top: calc(100% + 6px);
            left: 0; right: 0;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            max-height: 320px;
            overflow-y: auto;
            display: none;
            z-index: 100;
            box-shadow: var(--shadow-md);
        }

        .dropdown-menu.active { display: block; }

        .dropdown-item {
            padding: 0.7rem 1rem;
            cursor: pointer;
            border-bottom: 1px solid var(--border-soft);
            transition: background 0.15s;
        }

        .dropdown-item:last-child { border-bottom: none; }
        .dropdown-item:hover { background: var(--bg-surface-2); }

        .dropdown-item .category {
            font-size: 0.7rem;
            color: var(--accent);
            margin-bottom: 0.2rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            font-weight: 500;
        }

        .dropdown-item .text { font-size: 0.9rem; color: var(--text); }

        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: var(--border-strong);
            border-radius: 6px;
            border: 2px solid var(--bg-page);
        }
        ::-webkit-scrollbar-thumb:hover { background: #444b5a; }

        .progress-card {
            background: var(--bg-surface);
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: border-color 0.2s;
        }

        .progress-card:hover { border-color: var(--border-strong); }

        .progress-header {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            padding: 0.9rem 1.1rem;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s;
        }

        .progress-header:hover { background: var(--bg-surface-2); }

        .spinner {
            width: 16px; height: 16px;
            border: 2px solid var(--border-strong);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            flex-shrink: 0;
        }

        .spinner.done { display: none; }

        @keyframes spin { to { transform: rotate(360deg); } }

        .progress-text {
            color: var(--text-muted);
            font-size: 0.9rem;
            flex: 1;
        }

        .progress-toggle {
            color: var(--text-dim);
            font-size: 0.75rem;
            transition: transform 0.25s, color 0.15s;
        }

        .progress-header:hover .progress-toggle { color: var(--text-muted); }
        .progress-toggle.expanded { transform: rotate(180deg); }

        .mode-hint {
            padding: 0.7rem 1.1rem;
            background: var(--bg-deep);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 0.78rem;
            line-height: 1.5;
            display: none;
        }

        .mode-hint.visible { display: block; }

        .mode-hint-label {
            color: var(--text-muted);
            font-weight: 600;
            margin-right: 0.4rem;
        }

        .mode-hint-name {
            color: var(--accent);
            font-weight: 600;
            margin-right: 0.4rem;
        }

        .mode-hint-text { color: var(--text-dim); }

        .log-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease-out;
            background: var(--bg-deep);
        }

        .log-panel.expanded {
            max-height: 360px;
            overflow-y: auto;
        }

        .log-content {
            padding: 0.9rem 1.1rem;
            font-family: var(--font-mono);
            font-size: 0.78rem;
            line-height: 1.6;
            color: var(--text-muted);
            white-space: pre-wrap;
            word-break: break-all;
        }

        .log-content .log-line { padding: 1px 0; }

        .log-content .log-line.new {
            animation: fadeIn 0.4s;
            color: var(--accent-strong);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .response-card {
            background: var(--bg-surface);
            border-radius: var(--radius-md);
            padding: 1.75rem 1.75rem 1.5rem;
            border: 1px solid var(--border);
            display: none;
            box-shadow: var(--shadow-md);
        }

        .response-card.active { display: block; }

        .response-content { line-height: 1.75; color: var(--text); }

        .response-content h1,
        .response-content h2,
        .response-content h3 {
            color: var(--text);
            margin: 1.5rem 0 0.75rem;
            font-weight: 600;
        }

        .response-content h3 { font-size: 1.1rem; }
        .response-content p { margin-bottom: 0.9rem; }

        .response-content ul,
        .response-content ol {
            margin-left: 1.25rem;
            margin-bottom: 0.9rem;
        }

        .response-content li { margin-bottom: 0.35rem; }

        .response-content code {
            background: var(--bg-deep);
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 0.88em;
            color: var(--accent-strong);
            border: 1px solid var(--border);
        }

        .response-content pre {
            background: var(--bg-deep);
            padding: 0.9rem 1rem;
            border-radius: var(--radius-sm);
            overflow-x: auto;
            margin: 0.9rem 0;
            border: 1px solid var(--border);
        }

        .response-content pre code {
            background: none;
            padding: 0;
            color: var(--text);
            border: none;
        }

        .response-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            font-size: 0.92rem;
        }

        .response-content th,
        .response-content td {
            border: 1px solid var(--border);
            padding: 0.6rem 0.8rem;
            text-align: left;
        }

        .response-content th {
            background: var(--bg-surface-2);
            font-weight: 600;
            color: var(--text);
        }

        .response-content tr:hover td { background: var(--bg-surface-2); }

        .charts-container {
            margin-top: 1.75rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .chart-wrapper {
            background: var(--bg-surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1.25rem 1.25rem 1rem;
        }

        .chart-title {
            font-size: 0.95rem;
            color: var(--text);
            margin-bottom: 0.85rem;
            font-weight: 600;
        }

        .chart-container {
            width: 100%;
            height: 420px;
            min-height: 360px;
        }

        .table-wrapper {
            background: var(--bg-surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1.25rem 1.25rem 1rem;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        .data-table th,
        .data-table td {
            border: 1px solid var(--border);
            padding: 0.65rem 0.85rem;
            text-align: left;
            vertical-align: middle;
        }

        .data-table th {
            background: var(--bg-deep);
            color: var(--text);
            font-weight: 600;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            cursor: pointer;
            user-select: none;
            position: relative;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
        }

        .data-table th:hover {
            background: var(--bg-surface);
            color: var(--accent);
        }

        .data-table th::after {
            content: '⇅';
            margin-left: 0.5rem;
            color: var(--text-dim);
            font-size: 0.75rem;
            opacity: 0.5;
        }

        .data-table th.sort-asc::after  { content: '↑'; color: var(--accent); opacity: 1; }
        .data-table th.sort-desc::after { content: '↓'; color: var(--accent); opacity: 1; }

        .data-table tbody tr {
            transition: background 0.15s;
        }

        .data-table tbody tr:hover td {
            background: var(--bg-surface);
        }

        .data-table tbody tr:nth-child(even) td {
            background: rgba(255, 255, 255, 0.015);
        }

        .data-table td {
            color: var(--text);
            font-size: 0.9rem;
        }

        @media (max-width: 640px) {
            .data-table { font-size: 0.82rem; }
            .data-table th,
            .data-table td { padding: 0.5rem 0.6rem; }
            .table-wrapper { padding: 1rem; }
        }

        .json-details {
            margin-top: 0.85rem;
            border-top: 1px solid var(--border-soft);
            padding-top: 0.6rem;
        }

        .json-details summary {
            cursor: pointer;
            color: var(--text-dim);
            font-size: 0.8rem;
            padding: 0.2rem 0;
            user-select: none;
            transition: color 0.15s;
        }

        .json-details summary:hover { color: var(--accent); }

        .json-details pre {
            background: var(--bg-deep);
            padding: 0.8rem 1rem;
            border-radius: var(--radius-sm);
            overflow-x: auto;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            line-height: 1.5;
            max-height: 280px;
            overflow-y: auto;
            border: 1px solid var(--border);
            color: var(--text-muted);
        }

        .action-card {
            background:
                linear-gradient(180deg, rgba(106, 211, 201, 0.06), transparent 60%),
                var(--bg-surface-2);
            border: 1px solid var(--accent-border);
            border-radius: var(--radius-md);
            padding: 1.25rem 1.4rem;
        }

        .action-card-title {
            font-size: 1rem;
            color: var(--text);
            margin-bottom: 0.35rem;
            font-weight: 600;
        }

        .action-card-message {
            color: var(--text-muted);
            margin-bottom: 0.9rem;
            font-size: 0.92rem;
        }

        .action-button {
            background: var(--accent);
            color: #0f1115;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            transition: background 0.15s, transform 0.05s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .action-button:hover { background: var(--accent-strong); }
        .action-button:active { transform: translateY(1px); }

        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-dim);
        }

        .empty-state-icon { font-size: 3rem; margin-bottom: 0.75rem; }

        .log-copy-btn {
            display: none;
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 0.85rem;
            cursor: pointer;
            padding: 0.25rem 0.4rem;
            border-radius: 4px;
            transition: color 0.15s, background 0.15s;
            margin-right: 0.3rem;
        }
        .log-copy-btn:hover { color: var(--accent); background: var(--bg-surface-2); }
        .log-copy-btn.visible {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 640px) {
            body { padding: 1.25rem 1rem 3rem; }
            .page-header { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
            .mode-menu { min-width: 100%; right: auto; left: 0; }
            .response-card { padding: 1.25rem; }
            .chart-container { height: 340px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1>PM IQ <span class="accent">Agent</span></h1>

            <div class="mode-switcher" id="modeSwitcher">
                <button class="mode-toggle" id="modeToggle" aria-label="Выбрать режим работы" aria-haspopup="true" aria-expanded="false">
                    <span class="mode-dot" aria-hidden="true"></span>
                    <span class="mode-current" id="modeCurrent">—</span>
                    <span class="mode-arrow" aria-hidden="true">▼</span>
                </button>
                <div class="mode-menu" id="modeMenu" role="menu"></div>
            </div>
        </div>

        <!-- Input Section -->
        <div class="input-section">
            <div class="input-wrapper">
                <input type="text" id="questionInput" placeholder="Введите ваш вопрос или выберите из списка...">
                <button class="dropdown-toggle" id="dropdownToggle" aria-label="Показать подсказки">▼</button>
                <div class="dropdown-menu" id="dropdownMenu"></div>
            </div>
        </div>

        <!-- Progress Card -->
        <div class="progress-card" id="progressCard" style="display: none;">
            <div class="progress-header" id="progressHeader">
                <div class="spinner" id="spinner"></div>
                <div class="progress-text" id="progressText">Обрабатываю запрос...</div>
                <button class="log-copy-btn" id="logCopyBtn" title="Копировать логи" aria-label="Копировать логи">Копировать логи</button>
                <div class="progress-toggle" id="progressToggle">▼</div>
            </div>
            <div class="mode-hint" id="modeHint">
                <span class="mode-hint-name" id="modeHintName">—</span>
                <span class="mode-hint-text" id="modeHintText">—</span>
            </div>
            <div class="log-panel" id="logPanel">
                <div class="log-content" id="logContent"></div>
            </div>
        </div>

        <!-- Response Card -->
        <div class="response-card" id="responseCard">
            <div class="response-content" id="responseContent"></div>
            <div class="charts-container" id="chartsContainer"></div>
        </div>
    </div>

    <script>
        let currentSessionId = null;
        let charts = [];
        let logsExpanded = false;

        let currentMode = "concentrator";
        let modesCatalog = [];

        document.addEventListener('DOMContentLoaded', () => {
            loadPredefinedQuestions();
            loadModes();
            setupEventListeners();
        });

        async function copyLogsToClipboard() {
            const lines = document.querySelectorAll('#logContent .log-line');
            const text = Array.from(lines).map(l => l.textContent).join('\n');
            try {
                await navigator.clipboard.writeText(text);
                const btn = document.getElementById('logCopyBtn');
                const original = btn.textContent;
                btn.textContent = '✓';
                setTimeout(() => btn.textContent = original, 1200);
            } catch (e) {
                console.error('Copy failed', e);
            }
        }

        async function loadPredefinedQuestions() {
            try {
                const response = await fetch('/api/questions');
                const questions = await response.json();
                const dropdown = document.getElementById('dropdownMenu');
                dropdown.innerHTML = questions.map(q => `
                    <div class="dropdown-item" data-question="${escapeHtml(q.text)}">
                        <div class="category">${escapeHtml(q.category)}</div>
                        <div class="text">${escapeHtml(q.text)}</div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Failed to load questions:', error);
            }
        }

        async function loadModes() {
            try {
                const response = await fetch('/api/modes');
                const data = await response.json();
                modesCatalog = data.modes || [];
                currentMode = data.default || (modesCatalog[0] && modesCatalog[0].id) || "concentrator";
                renderModeMenu();
                applyMode(currentMode, false);
            } catch (error) {
                console.error('Failed to load modes:', error);
                modesCatalog = [
                    { id: "concentrator", label: "concentrator",
                      description: "" },
                    { id: "stateless",    label: "stateless",
                      description: "" }
                ];
                currentMode = "concentrator";
                renderModeMenu();
                applyMode(currentMode, false);
            }
        }

        function renderModeMenu() {
            const menu = document.getElementById('modeMenu');
            menu.innerHTML = modesCatalog.map(m => `
                <div class="mode-item ${m.id === currentMode ? 'active' : ''}"
                     data-mode="${escapeHtml(m.id)}" role="menuitem">
                    <div class="mode-name">${escapeHtml(m.label)}</div>
                    <div class="mode-desc">${escapeHtml(m.description)}</div>
                </div>
            `).join('');
        }

        function applyMode(modeId, updateHint) {
            if (updateHint === undefined) updateHint = true;
            currentMode = modeId;
            const mode = modesCatalog.find(m => m.id === modeId);
            if (!mode) return;

            document.getElementById('modeCurrent').textContent = mode.label;

            document.querySelectorAll('.mode-item').forEach(el => {
                el.classList.toggle('active', el.dataset.mode === modeId);
            });

            document.getElementById('modeHintName').textContent = mode.label;
            document.getElementById('modeHintText').textContent = mode.description;

            if (updateHint) {
                const progressCard = document.getElementById('progressCard');
            }
        }

        function setupEventListeners() {
            const input = document.getElementById('questionInput');
            const toggle = document.getElementById('dropdownToggle');
            const menu = document.getElementById('dropdownMenu');
            const progressHeader = document.getElementById('progressHeader');

            const modeToggle = document.getElementById('modeToggle');
            const modeMenu = document.getElementById('modeMenu');

            modeToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                const isOpen = modeMenu.classList.toggle('active');
                modeToggle.classList.toggle('open', isOpen);
                modeToggle.setAttribute('aria-expanded', String(isOpen));
            });

            modeMenu.addEventListener('click', (e) => {
                const item = e.target.closest('.mode-item');
                if (item) {
                    applyMode(item.dataset.mode);
                    modeMenu.classList.remove('active');
                    modeToggle.classList.remove('open');
                    modeToggle.setAttribute('aria-expanded', 'false');
                }
            });

            toggle.addEventListener('click', (e) => {
                e.stopPropagation();
                menu.classList.toggle('active');
                toggle.classList.toggle('rotated');
            });

            document.getElementById('logCopyBtn').addEventListener('click', (e) => {
                e.stopPropagation();
                copyLogsToClipboard();
            });

            document.addEventListener('click', () => {
                menu.classList.remove('active');
                toggle.classList.remove('rotated');
                modeMenu.classList.remove('active');
                modeToggle.classList.remove('open');
                modeToggle.setAttribute('aria-expanded', 'false');
            });

            menu.addEventListener('click', (e) => {
                const item = e.target.closest('.dropdown-item');
                if (item) {
                    input.value = item.dataset.question;
                    menu.classList.remove('active');
                    toggle.classList.remove('rotated');
                    submitQuestion();
                }
            });

            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    submitQuestion();
                    menu.classList.remove('active');
                    toggle.classList.remove('rotated');
                }
            });

            progressHeader.addEventListener('click', toggleLogs);
        }

        function toggleLogs() {
            logsExpanded = !logsExpanded;
            const panel = document.getElementById('logPanel');
            const toggle = document.getElementById('progressToggle');
            const copyBtn = document.getElementById('logCopyBtn');

            if (logsExpanded) {
                panel.classList.add('expanded');
                toggle.classList.add('expanded');
                copyBtn.classList.add('visible');
                setTimeout(() => { panel.scrollTop = panel.scrollHeight; }, 100);
            } else {
                panel.classList.remove('expanded');
                toggle.classList.remove('expanded');
                copyBtn.classList.remove('visible');
            }
        }

        async function submitQuestion() {
            const input = document.getElementById('questionInput');
            const query = input.value.trim();
            if (!query) return;

            // Сброс UI
            document.getElementById('logCopyBtn').classList.remove('visible');
            document.getElementById('responseCard').classList.remove('active');
            document.getElementById('progressCard').style.display = 'block';
            document.getElementById('logContent').innerHTML = '';
            document.getElementById('progressText').textContent = 'Обрабатываю запрос...';
            document.getElementById('spinner').classList.remove('done');
            logsExpanded = false;
            document.getElementById('logPanel').classList.remove('expanded');
            document.getElementById('progressToggle').classList.remove('expanded');

            applyMode(currentMode, true);
            // document.getElementById('modeHint').classList.add('visible');

            clearCharts();

            try {
                const response = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, mode: currentMode })
                });
                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error('HTTP ' + response.status + ': ' + errText);
                }
                const data = await response.json();
                currentSessionId = data.session_id;
                connectSSE(currentSessionId);
            } catch (error) {
                console.error('Failed to submit question:', error);
                alert('Ошибка при отправке вопроса: ' + error.message);
            }
        }

        function connectSSE(sessionId) {
            const eventSource = new EventSource('/stream/' + sessionId);

            eventSource.onmessage = function(event) {
                const message = JSON.parse(event.data);

                if (message.type === 'log') {
                    appendLogs([message.data]);
                } else if (message.type === 'result') {
                    onResult(message.data);
                    eventSource.close();
                } else if (message.type === 'error') {
                    onError(message.data);
                    eventSource.close();
                }
            };

            eventSource.onerror = function(error) {
                console.error('SSE error:', error);
                eventSource.close();
            };
        }

        function appendLogs(newLogs) {
            const logContent = document.getElementById('logContent');
            newLogs.forEach(line => {
                const div = document.createElement('div');
                div.className = 'log-line new';
                div.textContent = line;
                logContent.appendChild(div);
                setTimeout(() => div.classList.remove('new'), 500);
            });

            // Автопрокрутка, если логи развёрнуты
            if (logsExpanded) {
                const panel = document.getElementById('logPanel');
                panel.scrollTop = panel.scrollHeight;
            }
        }

        function onResult(data) {
            document.getElementById('spinner').classList.add('done');
            document.getElementById('progressText').textContent = '✓ Ответ готов';
            displayResult(data);
        }

        function onError(error) {
            document.getElementById('progressCard').style.display = 'none';
            alert('Ошибка: ' + error);
        }

        function displayResult(data) {
            const responseCard = document.getElementById('responseCard');
            const responseContent = document.getElementById('responseContent');
            const chartsContainer = document.getElementById('chartsContainer');

            responseContent.innerHTML = marked.parse(data.answer);

            chartsContainer.innerHTML = '';
            clearCharts();
            const extractedWidgets = extractWidgetsFromMarkdown(responseContent);
            const allWidgets = [...extractedWidgets, ...(data.widgets || [])];

            if (allWidgets.length > 0) {
                allWidgets.forEach((widget, index) => {
                    if (widget.chart_type === 'ActionCard') {
                        renderActionCard(widget, chartsContainer);
                    } else if (widget.widget_type === 'echarts') {
                        renderECharts(widget, chartsContainer, index);
                    } else if (widget.widget_type === 'table') {
                        renderTable(widget, chartsContainer);
                    }
                });
            }

            responseCard.classList.add('active');

            // Передёргиваем окно, чтобы ECharts пересчитал размеры.
            // Ждём 2 кадра анимации, чтобы браузер гарантированно завершил layout (reflow)
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    charts.forEach(chart => chart.resize());
                    window.dispatchEvent(new Event('resize'));
                });
            });
        }

        // Извлекает JSON-блоки с виджетами из markdown
        function extractWidgetsFromMarkdown(container) {
            const widgets = [];
            // Ищем все <pre><code> блоки
            const codeBlocks = container.querySelectorAll('pre code');
            codeBlocks.forEach(codeBlock => {
                const text = codeBlock.textContent.trim();
                if (text.startsWith('{') && text.includes('"widget_type"')) {
                    try {
                        const widget = JSON.parse(text);
                        if (widget.widget_type) {
                            widgets.push(widget);
                            // Удаляем этот блок из DOM чтобы не дублировался
                            const pre = codeBlock.parentElement;
                            if (pre && pre.tagName === 'PRE') {
                                pre.remove();
                            }
                        }
                    } catch (e) {
                        // Не валидный JSON, пропускаем
                        console.warn('Failed to parse widget JSON:', e);
                    }
                }
            });
            return widgets;
        }

        function renderECharts(widget, container, index) {
            const wrapper = document.createElement('div');
            wrapper.className = 'chart-wrapper';

            const title = document.createElement('div');
            title.className = 'chart-title';
            title.textContent = widget.title || 'Диаграмма';

            const chartDiv = document.createElement('div');
            chartDiv.className = 'chart-container';
            chartDiv.id = 'chart-' + Date.now() + '-' + index;

            const details = document.createElement('details');
            details.className = 'json-details';
            const summary = document.createElement('summary');
            summary.textContent = 'Показать исходный JSON';
            const pre = document.createElement('pre');
            pre.textContent = JSON.stringify(widget, null, 2);
            details.appendChild(summary);
            details.appendChild(pre);

            wrapper.appendChild(title);
            wrapper.appendChild(chartDiv);
            wrapper.appendChild(details);
            container.appendChild(wrapper);

            const chart = echarts.init(chartDiv, 'dark', { renderer: 'canvas' });
            chart.setOption(widget.option, true);

            charts.push(chart);
        }

        function renderTable(widget, container) {
            const wrapper = document.createElement('div');
            wrapper.className = 'table-wrapper';

            const title = document.createElement('div');
            title.className = 'chart-title';
            title.textContent = widget.title || 'Таблица данных';

            const table = document.createElement('table');
            table.className = 'data-table';

            const columns = widget.columns || [];
            const rows = widget.rows || [];

            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            columns.forEach(col => {
                const th = document.createElement('th');
                th.textContent = col.label || col.field;
                th.dataset.field = col.field;
                th.dataset.type = col.type || 'string';
                // Клик по заголовку - сортировка
                th.addEventListener('click', () => sortTable(table, col.field, col.type || 'string'));
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            table.appendChild(thead);

            const tbody = document.createElement('tbody');
            rows.forEach(row => {
                const tr = document.createElement('tr');
                columns.forEach(col => {
                    const td = document.createElement('td');
                    const value = row[col.field];
                    td.textContent = value !== undefined && value !== null ? value : '—';

                    // Подсветка по порогам, если они заданы
                    if (col.thresholds && value !== undefined && value !== null) {
                        const color = resolveColor(value, col.thresholds);
                        if (color) {
                            td.style.color = color;
                            td.style.fontWeight = '600';
                        }
                    }
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
            table.appendChild(tbody);

            const details = document.createElement('details');
            details.className = 'json-details';
            const summary = document.createElement('summary');
            summary.textContent = 'Показать исходный JSON';
            const pre = document.createElement('pre');
            pre.textContent = JSON.stringify(widget, null, 2);
            details.appendChild(summary);
            details.appendChild(pre);

            wrapper.appendChild(title);
            wrapper.appendChild(table);
            wrapper.appendChild(details);
            container.appendChild(wrapper);
        }

        // Сортировка таблицы по клику на заголовок
        function sortTable(table, field, type) {
            const tbody = table.querySelector('tbody');
            const rows = Array.from(tbody.querySelectorAll('tr'));
            const headers = table.querySelectorAll('thead th');
            const colIndex = Array.from(headers).findIndex(h => h.dataset.field === field);
            if (colIndex === -1) return;
            const currentDir = headers[colIndex].dataset.sortDir || 'none';
            const newDir = currentDir === 'asc' ? 'desc' : 'asc';
            headers.forEach(h => { h.dataset.sortDir = 'none'; h.classList.remove('sort-asc', 'sort-desc'); });
            headers[colIndex].dataset.sortDir = newDir;
            headers[colIndex].classList.add(newDir === 'asc' ? 'sort-asc' : 'sort-desc');
            rows.sort((a, b) => {
                const aVal = a.children[colIndex].textContent.trim();
                const bVal = b.children[colIndex].textContent.trim();
                if (type === 'number') {
                    const aNum = parseFloat(aVal) || 0;
                    const bNum = parseFloat(bVal) || 0;
                    return newDir === 'asc' ? aNum - bNum : bNum - aNum;
                }
                return newDir === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
            });
            rows.forEach(row => tbody.appendChild(row));
        }

        // Разрешение цвета по порогам (аналог _resolve_color_by_value из Python)
        function resolveColor(value, thresholds) {
            const numVal = parseFloat(value);
            if (!isNaN(numVal)) {
                // Числовые пороги
                const sorted = [...thresholds].sort((a, b) => (b.value || 0) - (a.value || 0));
                for (const t of sorted) {
                    if (numVal >= t.value) return t.color;
                }
                return sorted[sorted.length - 1]?.color || null;
            } else {
                // Строковые пороги
                const valStr = String(value).toLowerCase();
                for (const t of thresholds) {
                    if (String(t.value).toLowerCase() === valStr) return t.color;
                }
            }
            return null;
        }

        function renderActionCard(widget, container) {
            const card = document.createElement('div');
            card.className = 'action-card';

            card.innerHTML =
                '<div class="action-card-title">' + escapeHtml(widget.title || 'Action Required') + '</div>' +
                '<div class="action-card-message">' + escapeHtml(widget.message || '') + '</div>' +
                '<button class="action-button">' +
                    escapeHtml((widget.button && widget.button.text) || 'Take Action') +
                '</button>';

            card.querySelector('.action-button').addEventListener('click', () => {
                handleAction(widget.button && widget.button.action, widget.button && widget.button.payload);
            });

            container.appendChild(card);
        }

        function handleAction(action, payload) {
            alert('Action: ' + action + '\nPayload: ' + JSON.stringify(payload, null, 2) + '\n\n(Демонстрация. Реальное действие реализовать в бэкенде)');
        }

        function clearCharts() {
            charts.forEach(chart => chart.dispose());
            charts = [];
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
